<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP Abacaxita</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f5f2e8; color: #1f1f1f; margin: 0; }
      header { background: #3e2f1a; color: #f9f5e9; padding: 16px; text-align: center; }
      main { max-width: 900px; margin: 0 auto; padding: 24px; }
      .card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 16px; border: 1px solid #e4dccb; }
      .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      label { display: block; font-size: 12px; margin-bottom: 6px; }
      input, select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; }
      button { padding: 8px 12px; border-radius: 6px; border: none; background: #2c9b4f; color: #fff; cursor: pointer; }
      button.secondary { background: #a07b3b; }
      .muted { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>ERP Abacaxita</h1>
      <p class="muted">Painel simples e didatico</p>
    </header>

    <main>
      <div class="card">
        <h2>Cadastro rapido de produto</h2>
        <div class="grid">
          <div>
            <label>Nome</label>
            <input placeholder="Ex: Seda Bem Bolado" />
          </div>
          <div>
            <label>Preco</label>
            <input placeholder="Ex: 4.90" />
          </div>
          <div>
            <label>Categoria</label>
            <input placeholder="Ex: sedas" />
          </div>
          <div>
            <label>Estoque</label>
            <input placeholder="Ex: 120" />
          </div>
        </div>
        <div style="margin-top: 12px; display: flex; gap: 8px;">
          <button>Salvar</button>
          <button class="secondary">Limpar</button>
        </div>
      </div>

      <div class="card">
        <h2>Produtos</h2>
        <p class="muted">Integre com o backend em http://localhost:5050/products</p>
        <div class="grid">
          <div class="card">
            <strong>Seda Bem Bolado Brown</strong>
            <p class="muted">Estoque: 120</p>
            <div style="display: flex; gap: 8px;">
              <button>Editar</button>
              <button class="secondary">Desativar</button>
            </div>
          </div>
          <div class="card">
            <strong>Kit Premium Gold</strong>
            <p class="muted">Estoque: 45</p>
            <div style="display: flex; gap: 8px;">
              <button>Editar</button>
              <button class="secondary">Desativar</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Relatorios</h2>
        <p class="muted">Estoque e pedidos (placeholder didatico).</p>
      </div>
    </main>
  </body>
</html>
